<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recovery Tracker</title>
  <meta name="theme-color" content="#0d9488">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="icon" href="favicon-32.png" sizes="32x32" type="image/png">
  <link rel="icon" href="favicon-16.png" sizes="16x16" type="image/png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Recovery Tracker</p>
      <h1 id="greeting">Good evening</h1>
      <p class="subtitle" id="date-line"></p>
    </div>
    <div class="header-actions">
      <button id="notif-btn" class="btn btn-secondary btn-pill">Enable notifications</button>
    </div>
  </header>

  <main>
    <section id="items" class="items-grid" aria-label="Tracked items"></section>

    <section class="history-section">
      <div class="history-header">
        <h2>History</h2>
        <button id="copy-summary-btn" class="btn btn-secondary btn-pill">Copy summary</button>
      </div>
      <div id="history" aria-label="Logged history"></div>
    </section>

    <p class="disclaimer">
      This is a personal tracking tool, not medical advice. Default doses,
      intervals, and daily maximums are editable per item — set them to
      match what your surgeon actually told you. Notifications only fire
      while this page is open in your browser.
    </p>
  </main>

  <script src="script.js?v=3"></script>
</body>
</html>
